<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Touchless Reading Interface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/reader.css" />
  <link rel="stylesheet" href="css/gestures.css" />
  <link rel="stylesheet" href="css/accessibility.css" />
</head>

<body>

  <!-- CAMERA -->
  <video id="camera" autoplay playsinline></video>
  <canvas id="debug-canvas" width="640" height="480"></canvas>

  <!-- APP -->
  <main id="app">

    <!-- SETUP -->
    <section id="setup-screen" class="active">
      <h1>Touchless Reader</h1>

      <p class="instruction">
        Paste text or choose a sample to begin reading hands-free.
      </p>

      <textarea id="text-input" placeholder="Paste text here…" rows="8"></textarea>

      <div class="sample-buttons">
        <button data-sample="recipe">Recipe</button>
        <button data-sample="instructions">Instructions</button>
        <button data-sample="article">Article</button>
      </div>

      <button id="start-reading">Start Reading</button>
    </section>

    <!-- READER -->
    <section id="reader-screen">
      <article id="reader">
        <p>
          This is placeholder reading content. Loaded text will appear here
          in reading mode.
        </p>
      </article>

      <div id="scroll-indicator"></div>
    </section>

  </main>

  <!-- GESTURE HINTS -->
  <aside id="gesture-hints">
    <div class="hint">
      <img src="assets/icons/hand.svg" />
      <span>Move hand up / down to scroll</span>
    </div>

    <div class="hint">
      <img src="assets/icons/pinch.svg" />
      <span>Pinch to zoom</span>
    </div>

    <div class="hint">
      <img src="assets/icons/brightness.svg" />
      <span>Thumb up / down for brightness</span>
    </div>

    <div class="hint">
      <img src="assets/icons/highlight.svg" />
      <span>Point & hold to highlight</span>
    </div>
  </aside>

  <!-- FEEDBACK (UPDATED) -->
  <div id="gesture-feedback">
    <div style="display:flex; align-items:center; gap:8px;">
      <span id="health-dot" style="
        width:8px; height:8px; border-radius:50%;
        background:#ef4444;
      "></span>
      <span id="active-gesture-label"></span>
    </div>

    <div id="confidence-bar-wrap" style="
      display:none;
      align-items:center;
      gap:6px;
      margin-top:4px;
    ">
      <div style="
        flex:1;
        height:4px;
        background:rgba(255,255,255,0.2);
        border-radius:2px;
        overflow:hidden;
      ">
        <div id="confidence-bar-fill" style="
          height:100%;
          width:0%;
          border-radius:2px;
          transition: width 0.15s ease, background 0.3s;
        "></div>
      </div>
      <span id="confidence-bar-pct" style="
        font-size:10px;
        color:rgba(255,255,255,0.6);
        min-width:28px;
        text-align:right;
      "></span>
    </div>
  </div>

  <div id="brightness-overlay"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script src="js/smoothing.js"></script>
  <script src="js/reader.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/gestures.js"></script>
  <script src="js/mediapipe-setup.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
